services:

  postgres:

    image: postgres:16

    container_name: shiv-postgres

    restart: always

    environment:

      POSTGRES_DB: shiv_ai

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

    ports:

      - "5433:5432"

    volumes:

      - ./postgres/data:/var/lib/postgresql/data

      - ./postgres/init:/docker-entrypoint-initdb.d